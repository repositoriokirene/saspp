{% load static %}

<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <title>Login - SASPP</title>
</head>
<body>
    <form class="form" method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="logo">
            <img src="{% static 'img/saspp.png' %}" alt="SASPP">
        </div>
        <h2 class="form-title">Faça o login na sua conta</h2>
         <div class="input-container">
           <input placeholder="Insira o seu usuário" type="text" name="username" required>
           <span><i class="fa-solid fa-at"></i></span>
       </div>
       <div class="input-container">
           <input placeholder="Insira a sua senha" type="password" name="password" required>
           <span><i class="fa-solid fa-key"></i></span>
        </div>
        {% if form.non_field_errors %}
            <ul class="error">
                {% for error in form.non_field_errors %}
                    <li>* {{ error }}</li>
                {% endfor %}
            </ul>
        {% endif %}
       <p class="signup-link">Esqueceu a sua senha? <a href="">Recuperar senha</a></p>
        <button class="submit" type="submit">Login</button>
       <p class="signup-link">Não tem uma conta? <a href="{% url 'signup' %}">Crie uma conta</a></p>
    </form>
 
    
</body>
</html>
